# 本地独立运行依赖栈：PostgreSQL（业务库 + Flowable ACT_* 表共用）。
# 用法：docker compose -f docker-compose.local.yml up -d
# 凭据/库名均为脱敏占位（红线合规），仅用于本地开发调试。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: security
      POSTGRES_USER: security
      POSTGRES_PASSWORD: security
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U security"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - security-pg:/var/lib/postgresql/data

volumes:
  security-pg:
